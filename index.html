<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <meta name="theme-color" content="#ff85a1">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UmiCare 🐱 喔咪照護</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UmiCare">
<meta name="theme-color" content="#fff8f5">
<link rel="apple-touch-icon" href="/icon-192.png"></meta>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #ff85a1;
  --secondary: #c8a8e9;
  --accent: #ffb347;
  --cat-accent: #ff8c69;
  --cat-warm: #ffb347;
  --bg-primary: #fff8f5;
  --bg-secondary: #fff0eb;
  --bg-card: #ffffff;
  --bg-card2: #fef2f5;
  --text-primary: #3d2c35;
  --text-secondary: rgba(61,44,53,0.65);
  --text-muted: rgba(61,44,53,0.38);
  --glass: rgba(255,255,255,0.85);
  --glass-border: rgba(255,133,161,0.25);
  --success: #52c77e;
  --warning: #ffb347;
  --danger: #ff7c7c;
  --radius: 20px;
  --radius-sm: 14px;
  --font: 'Space Grotesk', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background animation */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 15% 15%, rgba(255,133,161,0.18) 0%, transparent 55%),
              radial-gradient(ellipse at 85% 85%, rgba(200,168,233,0.14) 0%, transparent 50%),
              radial-gradient(ellipse at 65% 5%, rgba(255,179,71,0.1) 0%, transparent 40%),
              radial-gradient(ellipse at 50% 100%, rgba(255,133,161,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ─── OVERLAY & MODALS ─── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.overlay.hidden { display: none; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 32px 24px;
  width: 100%; max-width: 380px;
  text-align: center;
  animation: slideUp 0.3s ease;
  box-shadow: 0 20px 60px rgba(255,133,161,0.18), 0 4px 20px rgba(0,0,0,0.06);
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal h2 { font-size: 1.4rem; margin-bottom: 8px; }
.modal p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }

/* ─── PIN INPUT ─── */
.pin-dots {
  display: flex; gap: 12px; justify-content: center; margin-bottom: 24px;
}
.pin-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid var(--glass-border);
  background: transparent;
  transition: all 0.2s;
}
.pin-dot.filled { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 8px rgba(255,133,161,0.5); }

.pin-pad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; max-width: 240px; margin: 0 auto;
}
.pin-btn {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 1.2rem; font-weight: 600;
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-user-select: none;
}
.pin-btn:active { transform: scale(0.92); background: var(--primary); }
.pin-btn.del { font-size: 0.9rem; color: var(--text-muted); }
.pin-btn.empty { visibility: hidden; }

.btn {
  display: block; width: 100%;
  padding: 14px 20px;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-secondary); }
.btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
.btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
.btn + .btn { margin-top: 10px; }

/* ─── APP SHELL ─── */
#app { position: relative; z-index: 1; min-height: 100vh; padding-bottom: 80px; }
#app.hidden { display: none; }

/* ─── HEADER ─── */
.header {
  padding: 20px 20px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left h1 {
  font-size: 1.5rem; font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--cat-accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-left .date {
  font-size: 0.8rem; color: var(--text-muted);
  font-family: var(--mono);
}
.admin-btn {
  width: 40px; height: 40px;
  background: rgba(255,133,161,0.12); border: 1px solid rgba(255,133,161,0.3);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.1rem; transition: all 0.2s;
}
.admin-btn:active { transform: scale(0.9); background: var(--primary); }

/* ─── PROGRESS RING ─── */
.progress-section {
  padding: 20px;
  display: flex; align-items: center; gap: 20px;
  background: linear-gradient(135deg, rgba(255,133,161,0.08) 0%, rgba(200,168,233,0.08) 100%);
  margin: 12px 16px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,133,161,0.15);
  box-shadow: 0 2px 12px rgba(255,133,161,0.08);
}
.progress-ring-wrap {
  position: relative; flex-shrink: 0;
}
.progress-ring-wrap svg { transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: var(--glass-border); stroke-width: 6; }
.progress-ring-fill {
  fill: none; stroke-width: 6; stroke-linecap: round;
  stroke: url(#ringGrad);
  transition: stroke-dashoffset 0.6s ease;
}
.progress-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.progress-pct { font-size: 1.3rem; font-weight: 700; line-height: 1; }
.progress-label { font-size: 0.6rem; color: var(--text-muted); margin-top: 2px; }

.progress-info h2 { font-size: 1.3rem; font-weight: 600; }
.progress-info .sub { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }
.progress-info .count { font-size: 0.75rem; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }

/* ─── ALERTS ─── */
.alerts { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.alert {
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
}
.alert-red { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; }
.alert-orange { background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.3); color: #fdba74; }
.alert-blue { background: rgba(200,168,233,0.12); border: 1px solid rgba(200,168,233,0.3); color: #a78bc4; }

/* ─── TASK LIST ─── */
.task-section { padding: 16px; }
.section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 12px; }
/* ─── PENDING / COMPLETED SECTIONS ─── */
.tasks-pending-section { margin-bottom: 8px; }
.tasks-done-section { margin-top: 6px; }
.tasks-done-section .section-title { color: #4ade80; }
.tasks-done-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0 10px;
}
.tasks-done-divider span {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
  color: #4ade80; text-transform: uppercase; white-space: nowrap;
}
.tasks-done-divider::before, .tasks-done-divider::after {
  content: ''; flex: 1;
  height: 1px; background: rgba(74,222,128,0.25);
}

/* ─── SLIDE-DOWN ANIMATION when task becomes done ─── */
@keyframes taskSlideDone {
  0%   { transform: translateY(0) scale(1);   opacity: 1; }
  30%  { transform: translateY(-6px) scale(1.02); opacity: 1; }
  70%  { transform: translateY(24px) scale(0.97); opacity: 0.5; }
  100% { transform: translateY(0) scale(1);   opacity: 1; }
}
@keyframes taskSlideIn {
  from { transform: translateY(-10px); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}
.task-card.animating-done {
  animation: taskSlideDone 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
}
.task-card.slide-in {
  animation: taskSlideIn 0.3s ease forwards;
}

.task-card {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(255,133,161,0.1), 0 1px 4px rgba(0,0,0,0.04);
}
.task-card.done { border-color: rgba(82,199,126,0.4); background: rgba(82,199,126,0.06); }
.task-card.expanded { border-color: rgba(102,126,234,0.4); }

.task-header {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; cursor: pointer;
}
.task-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #fff0f5, #fde8f0);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(255,133,161,0.15);
}
.task-info { flex: 1; }
.task-name { font-size: 0.95rem; font-weight: 600; }
.task-time { font-size: 0.75rem; color: var(--text-muted); font-family: var(--mono); }
.task-status {
  padding: 4px 10px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 600;
}
.status-pending { background: rgba(255,255,255,0.08); color: var(--text-muted); }
.status-done { background: rgba(74,222,128,0.2); color: #4ade80; }
.status-skip { background: rgba(251,146,60,0.2); color: #fb923c; }
.status-overdue { background: rgba(248,113,113,0.2); color: #f87171; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

/* ─── TASK EXPAND PANEL ─── */
.task-panel {
  padding: 0 16px 16px;
  border-top: 1px solid rgba(255,133,161,0.15);
  background: #fff9fb;
  display: none;
}
.task-panel.open { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

.done-toggle {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0;
}
.toggle-btn {
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--glass-border);
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font); font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.toggle-btn.selected-done { border-color: #4ade80; background: rgba(74,222,128,0.15); color: #4ade80; }
.toggle-btn.selected-skip { border-color: #f87171; background: rgba(248,113,113,0.15); color: #f87171; }

.result-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;
}
.result-btn {
  padding: 10px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--glass-border);
  background: var(--glass);
  color: var(--text-secondary);
  font-family: var(--font); font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.result-btn.selected { border-color: var(--primary); background: rgba(102,126,234,0.2); color: var(--primary); }

/* Weight inputs */
.weight-inputs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
.weight-field label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 6px; }
.weight-field input {
  width: 100%; padding: 12px 14px;
  background: var(--bg-card2); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--mono); font-size: 1.1rem;
}
.weight-result {
  background: rgba(255,133,161,0.08);
  border: 1px solid rgba(255,133,161,0.25);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.weight-result .label { font-size: 0.85rem; color: var(--text-secondary); }
.weight-result .value { font-size: 1.3rem; font-weight: 700; color: var(--cat-accent); font-family: var(--mono); }

.note-input {
  width: 100%; padding: 10px 14px;
  background: var(--bg-card2); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--font); font-size: 0.9rem;
  resize: none; margin-bottom: 14px;
}
.note-input::placeholder { color: var(--text-muted); }

.confirm-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.confirm-row .btn { padding: 12px; }

/* ─── CALENDAR VIEW ─── */
.calendar-section { padding: 16px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-nav { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; padding: 6px 12px; color: var(--text-primary); cursor: pointer; font-size: 1rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day-label { text-align: center; font-size: 0.7rem; color: var(--text-muted); padding: 4px 0; }
.cal-day {
  aspect-ratio: 1; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 500; cursor: pointer;
  transition: all 0.15s;
}
.cal-day.empty { background: transparent; }
.cal-day.today { border: 2px solid var(--primary); }
.cal-day.full { background: rgba(74,222,128,0.25); color: #4ade80; }
.cal-day.partial { background: rgba(251,146,60,0.2); color: #fb923c; }
.cal-day.missed { background: rgba(248,113,113,0.2); color: #f87171; }
.cal-day.future { background: var(--glass); color: var(--text-muted); }
.cal-day.no-data { background: var(--glass); color: var(--text-muted); }

/* ─── ADMIN PANEL ─── */
.admin-panel { padding: 16px; }
.admin-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 16px; }
.admin-tab {
  padding: 8px 14px; border-radius: 20px; border: 1px solid var(--glass-border);
  background: var(--glass); color: var(--text-muted);
  font-family: var(--font); font-size: 0.82rem; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.admin-tab.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-color: var(--primary); color: white; box-shadow: 0 4px 12px rgba(255,133,161,0.3); }

.admin-tab-content { display: none; }
.admin-tab-content.active { display: block; animation: fadeIn 0.2s ease; }

/* Records table */
.records-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.records-table th { color: var(--text-muted); padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--glass-border); }
.records-table td { padding: 8px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: top; }
.badge-done { color: #4ade80; }
.badge-skip { color: #f87171; }
.badge-pending { color: var(--text-muted); }

.card {
  background: var(--bg-card); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
  box-shadow: 0 2px 12px rgba(255,133,161,0.08);
}
.card-title { font-weight: 600; margin-bottom: 4px; }
.card-sub { font-size: 0.82rem; color: var(--text-muted); }
.card-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
}
.badge-overdue { background: rgba(248,113,113,0.2); color: #f87171; }
.badge-due-soon { background: rgba(251,146,60,0.2); color: #fb923c; }
.badge-ok { background: rgba(74,222,128,0.15); color: #4ade80; }

.form-field { margin-bottom: 14px; }
.form-field label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 6px; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 10px 14px;
  background: var(--bg-card2); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--font); font-size: 0.9rem;
}
.form-field textarea { resize: none; }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,133,161,0.2);
  display: flex; z-index: 50;
  padding-bottom: env(safe-area-inset-bottom, 0);
  box-shadow: 0 -4px 20px rgba(255,133,161,0.1);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 0 8px;
  cursor: pointer; transition: all 0.15s;
  border: none; background: transparent; color: var(--text-muted);
  font-family: var(--font); font-size: 0.7rem;
}
.nav-btn .icon { font-size: 1.3rem; margin-bottom: 2px; }
.nav-btn.active { color: var(--primary); }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg-card); border: 1px solid var(--glass-border);
  border-radius: 30px; padding: 10px 20px;
  font-size: 0.9rem; font-weight: 600;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  opacity: 0; transition: all 0.3s; z-index: 200; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── CONFETTI ─── */
.confetti-piece {
  position: fixed; width: 8px; height: 8px; border-radius: 2px;
  pointer-events: none; z-index: 300;
  animation: confettiFall 1.5s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(80vh) rotate(720deg); opacity: 0; }
}

/* ─── LOADING ─── */
.loading-spin {
  width: 20px; height: 20px; border: 2px solid var(--glass-border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── MISC ─── */
.divider { height: 1px; background: var(--glass-border); margin: 16px 0; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.text-muted { color: var(--text-muted); font-size: 0.82rem; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }

/* ── CUTE EXTRAS ── */
.section-title {
  font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--primary); font-weight: 700; margin-bottom: 12px;
}

.progress-pct {
  font-size: 1.3rem; font-weight: 700; line-height: 1;
  color: var(--primary);
}

.header-left h1 {
  background: linear-gradient(135deg, #ff85a1 0%, #c8a8e9 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.toggle-btn.selected-done { border-color: #52c77e; background: rgba(82,199,126,0.12); color: #3aaa63; }
.toggle-btn.selected-skip { border-color: #ff7c7c; background: rgba(255,124,124,0.12); color: #e05555; }

.pin-btn {
  background: rgba(255,133,161,0.06);
  border: 1.5px solid rgba(255,133,161,0.2);
}
.pin-btn:active { background: var(--primary); color: white; }

.btn-primary {
  background: linear-gradient(135deg, #ff85a1, #c8a8e9);
  box-shadow: 0 4px 14px rgba(255,133,161,0.35);
}

.btn-success { background: linear-gradient(135deg, #52c77e, #3aaa63); }
.btn-danger  { background: linear-gradient(135deg, #ff7c7c, #e05555); }

.overlay { background: rgba(255,240,245,0.75); }

.cal-day.full    { background: rgba(82,199,126,0.2); color: #3aaa63; }
.cal-day.partial { background: rgba(255,179,71,0.2); color: #d4831a; }
.cal-day.missed  { background: rgba(255,124,124,0.18); color: #c44; }
.cal-day.today   { border: 2px solid var(--primary); }

/* Cute floating hearts/paws in background */
.header::after {
  content: '🐾';
  position: absolute;
  right: 70px; top: 22px;
  font-size: 0.9rem; opacity: 0.2;
  pointer-events: none;
}

/* weight result value */
.weight-result .value { color: var(--primary); }

/* nav active */
.nav-btn.active { color: var(--primary); }
.nav-btn { color: var(--text-muted); }

/* records table */
.badge-done { color: #3aaa63; }
.badge-skip { color: #e05555; }

/* toast */
.toast {
  background: white;
  border: 1px solid rgba(255,133,161,0.3);
  color: var(--text-primary);
  box-shadow: 0 8px 32px rgba(255,133,161,0.2);
}

/* form inputs */
.form-field input, .form-field select, .form-field textarea,
.weight-field input, .note-input {
  background: #fff; border: 1.5px solid rgba(255,133,161,0.2);
  color: var(--text-primary);
}
.form-field input:focus, .weight-field input:focus {
  border-color: var(--primary); outline: none;
  box-shadow: 0 0 0 3px rgba(255,133,161,0.15);
}


  /* Push Notification Button */
  /* push debug banner */
#push-debug-banner {
  display: none;
  background: rgba(255,50,50,0.1);
  border: 1px solid rgba(255,50,50,0.3);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.75rem;
  color: #f87171;
  margin: 4px 8px;
  word-break: break-all;
}
.push-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #ff85a1, #c8a8e9);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(255,133,161,0.35);
    transition: all 0.2s;
    margin: 8px auto;
    width: fit-content;
  }
  .push-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(255,133,161,0.45); }
  .push-btn.enabled { background: linear-gradient(135deg, #a8e6cf, #7ec8a0); }
  .push-btn.denied { background: #ccc; cursor: not-allowed; }

/* ─── VERSION BADGE ─── */
#version-badge {
  font-size: 0.6rem;
  font-family: var(--mono);
  background: rgba(255,133,161,0.15);

}
</style>
</head>
<body>

<!-- PIN SETUP OVERLAY -->
<div id="pinSetupOverlay" class="overlay">
  <div class="modal">
    <div style="font-size:3rem;margin-bottom:12px">🐾</div>
    <h2>歡迎使用 UmiCare</h2>
    <p>首次使用，請設定管理員 PIN 碼<br><small style="color:var(--text-muted)">PIN 只存在伺服器，App 不記錄</small></p>
    <div class="pin-dots" id="setupDots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>

    <div id="setupConfirmMsg" style="font-size:0.82rem;color:var(--cat-accent);margin-bottom:12px;min-height:20px;"></div>

<div id="adminLoginOverlay" class="overlay hidden">

    <div style="font-size:2rem;margin-bottom:12px">🔐</div>
    <h2>管理員登入</h2>
    <p>請輸入 PIN 碼</p>
    <div class="pin-dots" id="loginDots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div id="loginError" style="font-size:0.82rem;color:#f87171;margin-bottom:12px;min-height:20px;"></div>
    <div class="pin-pad" id="loginPad"></div>
    <button class="btn btn-secondary mt-8" onclick="closeAdminLogin()">取消</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

  <!-- PAGE: TODAY -->
  <div id="pageTasks" class="page">
    <div class="header">
      <div class="header-left">
        <h1>UmiCare 🐾</h1>
        <div class="date" id="todayDate"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="version-badge">v3.1</span>
        <button id="push-btn" onclick="togglePushNotification()" title="啟用通知" style="background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px;border-radius:50%;transition:all 0.2s;" aria-label="啟用推播通知">🔔</button>
        <div class="admin-btn" onclick="openAdminLogin()" title="管理員">🔐</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#ff85a1"/>
              <stop offset="100%" style="stop-color:#ffb347"/>
            </linearGradient>
          </defs>
          <circle class="progress-ring-bg" cx="40" cy="40" r="33"/>
          <circle class="progress-ring-fill" id="progressRing" cx="40" cy="40" r="33"
            stroke-dasharray="207.3" stroke-dashoffset="207.3"/>
        </svg>
        <div class="progress-center">
          <div class="progress-pct" id="progressPct">0%</div>
          <div class="progress-label">完成</div>
        </div>
      </div>
      <div class="progress-info">
        <h2 id="catNameDisplay">喔咪</h2>
        <div class="sub" id="progressSub">今日任務</div>
        <div class="count" id="progressCount">0 / 0 完成</div>
      </div>
    </div>

    <div class="alerts" id="alertsContainer"></div>

    <div class="task-section">
      <div class="section-title">📋 今日任務</div>
      <div id="taskList"><div style="text-align:center;padding:40px"><div class="loading-spin"></div></div></div>
    </div>
  </div>

  <!-- PAGE: CALENDAR -->
  <div id="pageCalendar" class="page hidden">
    <div class="header">
      <div class="header-left"><h1>📅 日曆</h1></div>
    </div>
    <div class="calendar-section">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrevMonth()">‹</button>
        <div style="font-weight:600" id="calMonthLabel"></div>
        <button class="cal-nav" onclick="calNextMonth()">›</button>
      </div>
      <div class="cal-grid" id="calDayLabels">
        <div class="cal-day-label">日</div><div class="cal-day-label">一</div>
        <div class="cal-day-label">二</div><div class="cal-day-label">三</div>
        <div class="cal-day-label">四</div><div class="cal-day-label">五</div>
        <div class="cal-day-label">六</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div style="display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;" class="text-muted">
        <span><span style="color:#4ade80">●</span> 全完成</span>
        <span><span style="color:#fb923c">●</span> 部分完成</span>
        <span><span style="color:#f87171">●</span> 漏打卡</span>
        <span><span style="color:rgba(255,255,255,0.2)">●</span> 未來</span>
      </div>
    </div>
    <div id="calDayDetail" style="padding:0 16px;"></div>
  </div>

  <!-- PAGE: ADMIN -->
  <div id="pageAdmin" class="page hidden">
    <div class="header">
      <div class="header-left"><h1>🛠️ 管理員</h1></div>
      <div class="admin-btn" onclick="adminLogout()" title="登出">🚪</div>
    </div>
    <div class="admin-panel">
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchAdminTab('records')">📋 打卡紀錄</button>
        <button class="admin-tab" onclick="switchAdminTab('weights')">⚖️ 體重</button>
        <button class="admin-tab" onclick="switchAdminTab('tasks')">✏️ 任務管理</button>
        <button class="admin-tab" onclick="switchAdminTab('periodic')">🔄 不定期</button>
        <button class="admin-tab" onclick="switchAdminTab('settings')">⚙️ 設定</button>
      </div>

      <!-- Records Tab -->
      <div id="adminTabRecords" class="admin-tab-content active">
        <div class="form-field">
          <label>選擇日期</label>
          <input type="date" id="recordsDatePicker" onchange="loadAdminRecords()">
        </div>
        <div id="adminRecordsContent"><div class="loading-spin"></div></div>
      </div>

      <!-- Weights Tab -->
      <div id="adminTabWeights" class="admin-tab-content">
        <div id="adminWeightsContent"><div class="loading-spin"></div></div>
      </div>

      <!-- Tasks Tab -->
      <div id="adminTabTasks" class="admin-tab-content">
        <div id="adminTasksList"></div>
        <button class="btn btn-primary mt-16" onclick="showAddTaskForm()">＋ 新增任務</button>
        <div id="addTaskForm" style="display:none;margin-top:16px;" class="card">
          <div class="form-field"><label>任務名稱</label><input type="text" id="newTaskName" placeholder="例：早餐"></div>
          <div class="form-field"><label>圖示 (emoji)</label><input type="text" id="newTaskIcon" placeholder="🍽️" maxlength="2"></div>
          <div class="form-field">
            <label>類型</label>
            <select id="newTaskType">
              <option value="meal">🍽️ 餐食</option>
              <option value="litter">🪣 貓砂</option>
              <option value="water">💧 飲水</option>
              <option value="weight">⚖️ 體重</option>
              <option value="groom">✂️ 美容</option>
              <option value="other">📌 其他</option>
            </select>
          </div>
          <div class="form-field"><label>時間 (HH:MM)</label><input type="time" id="newTaskTime"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <button class="btn btn-success" onclick="saveNewTask()">儲存</button>
            <button class="btn btn-secondary" onclick="document.getElementById('addTaskForm').style.display='none'">取消</button>
          </div>
        </div>
      </div>

      <!-- Periodic Tab -->
      <div id="adminTabPeriodic" class="admin-tab-content">
        <div id="adminPeriodicContent"><div class="loading-spin"></div></div>
      </div>

      <!-- Settings Tab -->
      <div id="adminTabSettings" class="admin-tab-content">
        <div class="card">
          <div class="form-field"><label>貓咪名字</label><input type="text" id="settingCatName" placeholder="喔咪"></div>
          <div class="form-field"><label>預設人重 (kg)</label><input type="number" id="settingPersonWeight" step="0.1" placeholder="66.5"></div>
          <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
        </div>
        <div class="card mt-16">
          <div style="font-weight:600;margin-bottom:10px">🔐 更改 PIN</div>
          <div class="form-field"><label>現有 PIN</label><input type="password" id="oldPin" placeholder="輸入現有 PIN" inputmode="numeric"></div>
          <div class="form-field"><label>新 PIN</label><input type="password" id="newPin" placeholder="輸入新 PIN" inputmode="numeric"></div>
          <button class="btn btn-primary" onclick="changePin()">更改 PIN</button>
        </div>
        
        <div class="card mt-16">
          <div style="font-weight:600;margin-bottom:10px">📥 匯出資料</div>
          <button class="btn btn-secondary" onclick="exportData()">下載 JSON</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="navTasks" onclick="switchPage('tasks')">
      <span class="icon">📋</span>今日
    </button>
    <button class="nav-btn" id="navCalendar" onclick="switchPage('calendar')">
      <span class="icon">📅</span>日曆
    </button>
  </nav>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = '';

// ─── STATE ─────────────────────────────────────────────────────
let state = {
  tasks: [],
  checkins: [],
  settings: { lastPersonWeight: 66.5 },
  catName: '喔咪',
  adminMode: false,
  currentDate: todayStr(),
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  expandedTask: null,
  setupStep: 'enter', // 'enter' or 'confirm'
  setupFirstPin: '',
  pinBuffer: [],
};

function todayStr() {
  // Use HKT (UTC+8) date so frontend matches the server-side cron
  const d = new Date(Date.now() + 8 * 3600 * 1000);
  return d.toISOString().split('T')[0];
}

// ─── API HELPERS ───────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) throw new Error(`API ${path} error ${res.status}`);
  return res.json();
}

// ─── INIT ──────────────────────────────────────────────────────
async function init() {
  updateDateDisplay();
  try {
    const pinCheck = await api('/api/pin/check');
    if (!pinCheck.hasPin) {
      showPinSetup();
    } else {
      await loadApp();
      checkPushStatus();
    }
  } catch(e) {
    showToast('⚠️ 無法連接伺服器，請檢查網絡');
    // Still show app with empty state
    document.getElementById('pinSetupOverlay').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderTaskList();
  }
}

async function loadApp() {
  document.getElementById('pinSetupOverlay').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  try {
    const [tasks, checkins, settings] = await Promise.all([
      api('/api/tasks'),
      api('/api/checkins?date=' + state.currentDate),
      api('/api/settings'),
    ]);
    state.tasks = tasks;
    state.checkins = checkins;
    state.settings = settings;
    state.catName = settings.catName || '喔咪';
    document.getElementById('catNameDisplay').textContent = state.catName;
  } catch(e) {
    showToast('⚠️ 載入資料失敗');
  }
  renderTaskList();
  renderProgress();
  checkAlerts();
}

function updateDateDisplay() {
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('todayDate').textContent =
    `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} 星期${days[d.getDay()]}`;
}

// ─── PIN SETUP ─────────────────────────────────────────────────
function showPinSetup() {
  document.getElementById('pinSetupOverlay').classList.remove('hidden');
  buildPinPad('setupPad', handleSetupPin);
}

function buildPinPad(padId, handler) {
  const pad = document.getElementById(padId);
  pad.innerHTML = '';
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'pin-btn' + (k==='' ? ' empty' : '') + (k==='⌫' ? ' del' : '');
    btn.textContent = k;
    if (k !== '') btn.onclick = () => handler(String(k));
    pad.appendChild(btn);
  });
}

function updatePinDots(dotsId, len) {
  const dots = document.querySelectorAll(`#${dotsId} .pin-dot`);
  dots.forEach((d,i) => d.classList.toggle('filled', i < len));
}

function handleSetupPin(key) {
  if (key === '⌫') {
    state.pinBuffer = state.pinBuffer.slice(0,-1);
  } else if (state.pinBuffer.length < 6) {
    state.pinBuffer.push(key);
  }
  updatePinDots('setupDots', state.pinBuffer.length);

  if (state.pinBuffer.length >= 4) {
    const pin = state.pinBuffer.join('');
    if (state.setupStep === 'enter') {
      state.setupFirstPin = pin;
      state.setupStep = 'confirm';
      state.pinBuffer = [];
      document.getElementById('setupConfirmMsg').textContent = '請再次輸入確認 PIN';
      updatePinDots('setupDots', 0);
    } else {
      if (pin === state.setupFirstPin) {
        document.getElementById('setupConfirmMsg').textContent = '✅ 設定中...';
        api('/api/pin/setup', { method: 'POST', body: JSON.stringify({ pin }) })
          .then(() => { showToast('✅ PIN 設定成功！'); loadApp(); })
          .catch(() => showToast('❌ 設定失敗，請重試'));
      } else {
        document.getElementById('setupConfirmMsg').textContent = '❌ PIN 不一致，請重新輸入';
        state.setupStep = 'enter';
        state.setupFirstPin = '';
        state.pinBuffer = [];
        updatePinDots('setupDots', 0);
      }
    }
  }
}

// ─── ADMIN LOGIN ───────────────────────────────────────────────
function openAdminLogin() {
  state.pinBuffer = [];
  updatePinDots('loginDots', 0);
  document.getElementById('loginError').textContent = '';
  document.getElementById('adminLoginOverlay').classList.remove('hidden');
  buildPinPad('loginPad', handleLoginPin);
}

function closeAdminLogin() {
  document.getElementById('adminLoginOverlay').classList.add('hidden');
}

function handleLoginPin(key) {
  if (key === '⌫') {
    state.pinBuffer = state.pinBuffer.slice(0,-1);
  } else if (state.pinBuffer.length < 6) {
    state.pinBuffer.push(key);
  }
  updatePinDots('loginDots', state.pinBuffer.length);

  if (state.pinBuffer.length >= 4) {
    const pin = state.pinBuffer.join('');
    state.pinBuffer = [];
    api('/api/pin/verify', { method: 'POST', body: JSON.stringify({ pin }) })
      .then(r => {
        if (r.valid) {
          closeAdminLogin();
          state.adminMode = true;
          switchPage('admin');
          showToast('✅ 管理員模式');
          loadAdminData();
        } else {
          document.getElementById('loginError').textContent = '❌ PIN 不正確';
          updatePinDots('loginDots', 0);
        }
      })
      .catch(() => {
        document.getElementById('loginError').textContent = '❌ 驗證失敗';
      });
  }
}

function adminLogout() {
  state.adminMode = false;
  switchPage('tasks');
  showToast('已登出管理員模式');
}

// ─── NAVIGATION ────────────────────────────────────────────────
function switchPage(page) {
  ['tasks','calendar','admin'].forEach(p => {
    document.getElementById('page' + p.charAt(0).toUpperCase() + p.slice(1)).classList.toggle('hidden', p !== page);
  });
  ['navTasks','navCalendar'].forEach(id => {
    document.getElementById(id)?.classList.remove('active');
  });
  if (page === 'tasks') document.getElementById('navTasks').classList.add('active');
  if (page === 'calendar') {
    document.getElementById('navCalendar').classList.add('active');
    renderCalendar();
  }
}

// ─── TASK RENDERING ────────────────────────────────────────────
function renderTaskCard(task, checkin) {
  const status = checkin ? (checkin.isDone ? 'done' : 'skip') : getOverdueStatus(task);
  const statusLabel = { done: '✅ 完成', skip: '跳過', pending: '待完成', overdue: '⚠️ 逾時' }[status];
  const statusClass = 'status-' + status;
  return `<div class="task-card ${status === 'done' ? 'done' : ''}" id="card-${task.id}">
      <div class="task-header" onclick="toggleTask('${task.id}')">
        <div class="task-icon">${task.icon || '📌'}</div>
        <div class="task-info">
          <div class="task-name">${task.name}</div>
          <div class="task-time">${task.scheduledTimes?.[0] || ''}</div>
        </div>
        <div class="task-status ${statusClass}">${statusLabel}</div>
      </div>
      <div class="task-panel" id="panel-${task.id}">
        ${renderTaskPanel(task, checkin)}
      </div>
    </div>`;
}

function renderTaskList() {
  const container = document.getElementById('taskList');
  if (!state.tasks.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">暫無任務</div>';
    return;
  }

  const pending = [];
  const done    = [];

  state.tasks.forEach(task => {
    const checkin = state.checkins.find(c => c.taskId === task.id);
    const isDone  = checkin?.isDone;
    const isSkip  = checkin && !checkin.isDone;
    if (isDone || isSkip) done.push({ task, checkin });
    else pending.push({ task, checkin });
  });

  let html = '<div class="tasks-pending-section">';
  if (pending.length === 0) {
    html += '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:0.9rem">🎉 所有任務已完成！</div>';
  } else {
    html += pending.map(({ task, checkin }) => renderTaskCard(task, checkin)).join('');
  }
  html += '</div>';

  if (done.length > 0) {
    html += `<div class="tasks-done-divider"><span>✅ 已完成 (${done.length})</span></div>`;
    html += '<div class="tasks-done-section">';
    html += done.map(({ task, checkin }) => renderTaskCard(task, checkin)).join('');
    html += '</div>';
  }

  container.innerHTML = html;
}

function getOverdueStatus(task) {
  const now = new Date();
  const time = task.scheduledTimes?.[0];
  if (!time) return 'pending';
  const [h, m] = time.split(':').map(Number);
  const scheduled = new Date();
  scheduled.setHours(h, m, 0, 0);
  if (now > scheduled && (now - scheduled) > 30 * 60 * 1000) return 'overdue';
  return 'pending';
}

function renderTaskPanel(task, checkin) {
  const isWeight = task.type === 'weight';
  const isDone = checkin?.isDone;
  const isSkip = checkin && !checkin.isDone;
  const selectedResult = checkin?.result || '';
  const note = checkin?.note || '';

  if (isWeight) {
    return `
      <div class="weight-inputs mt-8" id="weightInputs-${task.id}">
        <div class="weight-field">
          <label>人重（今次）kg</label>
          <input type="number" step="0.1" id="personW-${task.id}" 
            placeholder="上次: ${state.settings.lastPersonWeight || 66.5} kg"
            value="" inputmode="decimal"
            oninput="calcCatWeight('${task.id}')">
        </div>
        <div class="weight-field">
          <label>抱著喔咪量 kg</label>
          <input type="number" step="0.1" id="carryW-${task.id}"
            value="" inputmode="decimal"
            oninput="calcCatWeight('${task.id}')">
        </div>
        <div class="weight-result" id="catWResult-${task.id}">
          <span class="label">🐱 喔咪體重</span>
          <span class="value" id="catWValue-${task.id}">-- kg</span>
        </div>
      </div>
      <textarea class="note-input" id="note-${task.id}" placeholder="備注（選填）" rows="2">${note}</textarea>
      <div class="confirm-row">
        <button class="btn btn-success" onclick="submitWeight('${task.id}')">✅ 確認記錄</button>
        <button class="btn btn-secondary" onclick="toggleTask('${task.id}')">取消</button>
      </div>`;
  }

  const resultHtml = task.resultOptions?.length ? `
    <div class="section-title mt-8">選擇結果</div>
    <div class="result-grid">
      ${task.resultOptions.map(r => `
        <button class="result-btn ${selectedResult === r.value ? 'selected' : ''}"
          id="res-${task.id}-${r.value}"
          onclick="selectResult('${task.id}', '${r.value}')">
          ${r.label}
        </button>`).join('')}
    </div>` : '';

  return `
    <div class="done-toggle mt-8">
      <button class="toggle-btn ${isDone ? 'selected-done' : ''}" 
        id="done-${task.id}" onclick="selectDone('${task.id}', true)">✅ 完成</button>
      <button class="toggle-btn ${isSkip ? 'selected-skip' : ''}"
        id="skip-${task.id}" onclick="selectDone('${task.id}', false)">❌ 沒做</button>
    </div>
    ${resultHtml}
    <textarea class="note-input" id="note-${task.id}" placeholder="備注（選填）" rows="2">${note}</textarea>
    <div class="confirm-row">
      <button class="btn btn-success" onclick="submitCheckin('${task.id}')">✅ 確認提交</button>
      <button class="btn btn-secondary" onclick="toggleTask('${task.id}')">取消</button>
    </div>`;
}

let taskDoneState = {}; // taskId -> true/false/null
let taskResultState = {}; // taskId -> value

function toggleTask(taskId) {
  const panel = document.getElementById('panel-' + taskId);
  const card = document.getElementById('card-' + taskId);
  const isOpen = panel.classList.contains('open');
  // Close all
  document.querySelectorAll('.task-panel.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.task-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!isOpen) {
    panel.classList.add('open');
    card.classList.add('expanded');
    state.expandedTask = taskId;
    // Pre-fill person weight hint
    const personInput = document.getElementById('personW-' + taskId);
    if (personInput) personInput.placeholder = `上次: ${state.settings.lastPersonWeight || 66.5} kg`;
  } else {
    state.expandedTask = null;
  }
}

function selectDone(taskId, done) {
  taskDoneState[taskId] = done;
  document.getElementById('done-' + taskId).classList.toggle('selected-done', done);
  document.getElementById('skip-' + taskId).classList.toggle('selected-skip', !done);
}

function selectResult(taskId, value) {
  taskResultState[taskId] = value;
  const task = state.tasks.find(t => t.id === taskId);
  task?.resultOptions?.forEach(r => {
    const btn = document.getElementById(`res-${taskId}-${r.value}`);
    if (btn) btn.classList.toggle('selected', r.value === value);
  });
}

function calcCatWeight(taskId) {
  const personInput = document.getElementById('personW-' + taskId);
  const carryInput  = document.getElementById('carryW-' + taskId);
  const resultEl    = document.getElementById('catWValue-' + taskId);
  // Use typed value, fallback to last known person weight
  const personW = parseFloat(personInput.value) || parseFloat(state.settings?.lastPersonWeight) || 66.5;
  const carryW  = parseFloat(carryInput.value);
  if (!isNaN(carryW) && carryW > 0 && carryW > personW) {
    const cat = (carryW - personW).toFixed(2);
    resultEl.textContent = cat + ' kg';
    resultEl.style.color = '#4ade80';
  } else if (!isNaN(carryW) && carryW > 0) {
    resultEl.textContent = '⚠️ 應大於人重';
    resultEl.style.color = '#f87171';
  } else {
    resultEl.textContent = '-- kg';
    resultEl.style.color = '';
  }
}

async function submitWeight(taskId) {
  const personInput = document.getElementById('personW-' + taskId);
  const carryInput = document.getElementById('carryW-' + taskId);
  const note = document.getElementById('note-' + taskId).value;
  
  const personW = parseFloat(personInput.value) || parseFloat(state.settings.lastPersonWeight) || 66.5;
  const carryW = parseFloat(carryInput.value);
  
  if (isNaN(carryW) || carryW <= 0) {
    showToast('⚠️ 請輸入抱貓重量');
    return;
  }
  if (carryW <= personW) {
    showToast('⚠️ 抱貓重應大於人重');
    return;
  }

  try {
    await api('/api/weights', {
      method: 'POST',
      body: JSON.stringify({ personWeight: personW, carryWeight: carryW, note }),
    });
    await api('/api/checkins', {
      method: 'POST',
      body: JSON.stringify({ taskId, isDone: true, result: `${(carryW-personW).toFixed(2)}kg`, note, date: state.currentDate, time: new Date().toISOString() }),
    });
    state.settings.lastPersonWeight = personW;
    const cat = (carryW - personW).toFixed(2);
    showToast(`🐱 喔咪體重：${cat} kg ✅`);
    confetti();
    await reloadCheckins(taskId);
  } catch(e) {
    showToast('❌ 記錄失敗，請重試');
  }
}

async function submitCheckin(taskId) {
  const isDone = taskDoneState[taskId];
  if (isDone === undefined || isDone === null) {
    showToast('⚠️ 請先選擇完成 / 沒做');
    return;
  }
  const result = taskResultState[taskId] || null;
  const note = document.getElementById('note-' + taskId)?.value || '';

  try {
    await api('/api/checkins', {
      method: 'POST',
      body: JSON.stringify({ taskId, isDone, result, note, date: state.currentDate, time: new Date().toISOString() }),
    });
    if (isDone) { showToast('✅ 打卡成功！'); confetti(); }
    else showToast('📝 已記錄');
    delete taskDoneState[taskId];
    delete taskResultState[taskId];
    await reloadCheckins(isDone ? taskId : null);
    if (!isDone) toggleTask(taskId);
  } catch(e) {
    showToast('❌ 提交失敗，請重試');
  }
}

async function reloadCheckins(justCompletedId) {
  try {
    state.checkins = await api('/api/checkins?date=' + state.currentDate);
  } catch(e) {}
  if (justCompletedId) {
    // Animate the card sliding down before re-render
    const card = document.getElementById('card-' + justCompletedId);
    if (card) {
      card.classList.add('animating-done');
      await new Promise(r => setTimeout(r, 450));
    }
  }
  renderTaskList();
  renderProgress();
  checkAlerts();
  // Fade in newly-rendered done card
  if (justCompletedId) {
    const newCard = document.getElementById('card-' + justCompletedId);
    if (newCard) {
      newCard.classList.add('slide-in');
      setTimeout(() => newCard.classList.remove('slide-in'), 350);
    }
  }
}

// ─── PROGRESS ──────────────────────────────────────────────────
function renderProgress() {
  const total = state.tasks.length;
  const done = state.checkins.filter(c => c.isDone).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const circumference = 2 * Math.PI * 33;
  const offset = circumference - (pct / 100) * circumference;
  document.getElementById('progressRing').style.strokeDashoffset = offset;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressCount').textContent = `${done} / ${total} 完成`;
  const msgs = ['今日任務','加油！繼續努力 💪','快到了！','差不多啦 🎉','全部完成！🎊'];
  const idx = pct === 100 ? 4 : pct >= 75 ? 3 : pct >= 50 ? 2 : pct > 0 ? 1 : 0;
  document.getElementById('progressSub').textContent = msgs[idx];
}

async function checkAlerts() {
  const container = document.getElementById('alertsContainer');
  container.innerHTML = '';
  const now = new Date();
  const hour = now.getHours();
  if (state.checkins.length === 0 && hour >= 14) {
    container.innerHTML += `<div class="alert alert-blue">💡 今天還沒有打卡記錄</div>`;
  }
  // Check no meal eaten
  const mealTasks = state.tasks.filter(t => t.type === 'meal');
  const noneEaten = state.checkins.filter(c => c.result === 'none' && mealTasks.find(t => t.id === c.taskId));
  if (noneEaten.length >= 2) {
    container.innerHTML += `<div class="alert alert-red">⚠️ 喔咪今天多次未進食，請留意健康狀況</div>`;
  }
}

// ─── CALENDAR ──────────────────────────────────────────────────
function renderCalendar() {
  const y = state.calYear, m = state.calMonth;
  document.getElementById('calMonthLabel').textContent = `${y} 年 ${m+1} 月`;
  const grid = document.getElementById('calGrid');
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date();
  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = y===today.getFullYear() && m===today.getMonth() && d===today.getDate();
    const isFuture = new Date(y,m,d) > today;
    const cls = isFuture ? 'future' : 'no-data';
    html += `<div class="cal-day ${cls} ${isToday?'today':''}" id="cal-${dateStr}" 
      onclick="showDayDetail('${dateStr}')">${d}</div>`;
  }
  grid.innerHTML = html;
  // Load last 30 days
  loadCalendarData(y, m);
}

async function loadCalendarData(y, m) {
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date();
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(y, m, d);
    if (dt > today) break;
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    try {
      const checkins = await api('/api/checkins?date=' + dateStr);
      const total = state.tasks.length;
      const done = checkins.filter(c => c.isDone).length;
      const el = document.getElementById('cal-' + dateStr);
      if (!el) continue;
      el.classList.remove('no-data','full','partial','missed');
      if (checkins.length === 0) el.classList.add('missed');
      else if (done === total) el.classList.add('full');
      else if (done > 0) el.classList.add('partial');
      else el.classList.add('missed');
    } catch(e) {}
  }
}

async function showDayDetail(dateStr) {
  const detail = document.getElementById('calDayDetail');
  detail.innerHTML = '<div style="padding:10px"><div class="loading-spin"></div></div>';
  try {
    const checkins = await api('/api/checkins?date=' + dateStr);
    if (!checkins.length) {
      detail.innerHTML = `<div class="card"><div class="text-muted">${dateStr} 無打卡記錄</div></div>`;
      return;
    }
    const rows = checkins.map(c => {
      const task = state.tasks.find(t => t.id === c.taskId);
      return `<tr>
        <td>${task?.icon || '📌'} ${task?.name || c.taskId}</td>
        <td class="${c.isDone ? 'badge-done' : 'badge-skip'}">${c.isDone ? '✅' : '❌'}</td>
        <td>${c.result || '-'}</td>
        <td class="text-muted">${c.note || '-'}</td>
        <td class="text-muted" style="font-family:var(--mono);font-size:0.75rem">${c.time ? new Date(c.time).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'}) : '-'}</td>
      </tr>`;
    }).join('');
    detail.innerHTML = `<div class="card">
      <div style="font-weight:600;margin-bottom:12px">${dateStr} 打卡記錄</div>
      <div style="overflow-x:auto">
      <table class="records-table">
        <thead><tr><th>任務</th><th>狀態</th><th>結果</th><th>備注</th><th>時間</th></tr></thead>

      </table></div></div>`;
  } catch(e) {
    detail.innerHTML = '<div class="card text-muted">載入失敗</div>';
  }
}

function calPrevMonth() {
  if (state.calMonth === 0) { state.calMonth = 11; state.calYear--; }
  else state.calMonth--;
  renderCalendar();
}
function calNextMonth() {
  if (state.calMonth === 11) { state.calMonth = 0; state.calYear++; }
  else state.calMonth++;
  renderCalendar();
}

  const newTask = {

async function loadAdminPeriodic() {
  const container = document.getElementById('adminPeriodicContent');
  container.innerHTML = '<div class="loading-spin"></div>';
  try {
    const periodic = await api('/api/periodic');
    const now = new Date();
    container.innerHTML = periodic.map(p => {
      let dueInfo = '', badgeClass = 'badge-ok', dueText = '正常 ✅';
      if (p.intervalDays && p.lastDoneAt) {
        const due = new Date(p.lastDoneAt);
        due.setDate(due.getDate() + p.intervalDays);
        const diffDays = Math.ceil((due - now) / 86400000);
        if (diffDays < 0) { badgeClass = 'badge-overdue'; dueText = `逾期 ${-diffDays} 天`; }
        else if (diffDays <= 3) { badgeClass = 'badge-due-soon'; dueText = `${diffDays} 天後到期`; }
        dueInfo = `<div class="text-muted mt-8">上次: ${new Date(p.lastDoneAt).toLocaleDateString('zh-HK')} · 每 ${p.intervalDays} 天</div>`;
      } else if (!p.lastDoneAt) {
        badgeClass = 'badge-overdue'; dueText = '未記錄';
      }
      return `<div class="card">
        <div class="flex-between">
          <div><div class="card-title">${p.name}</div>${dueInfo}${p.note ? `<div class="text-muted">${p.note}</div>` : ''}</div>
          <span class="card-badge ${badgeClass}">${dueText}</span>
        </div>
        <button class="btn btn-success mt-8" style="max-width:120px;padding:8px" onclick="markPeriodic('${p.id}')">✅ 完成</button>
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = '<div class="text-muted">載入失敗</div>';
  }
}

async function markPeriodic(id) {
  const periodic = await api('/api/periodic');
  const item = periodic.find(p => p.id === id);
  if (!item) return;
  item.lastDoneAt = new Date().toISOString();
  if (item.weeklyCount !== undefined) item.weeklyCount = (item.weeklyCount || 0) + 1;
  await api('/api/periodic', { method: 'POST', body: JSON.stringify(periodic) });
  showToast('✅ 已記錄完成');

function confetti() {
  const colors = ['#667eea','#f4a261','#f093fb','#4ade80','#fb923c'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random()*100}vw;
        top: -10px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration: ${1 + Math.random()}s;
        animation-delay: ${Math.random()*0.3}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }, i * 40);
  }
}

  const raw = window.atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

async function togglePushNotification() {
  const btn = document.getElementById('push-btn');

  // Check if already subscribed → unsubscribe
  if (btn && btn.dataset.subscribed === 'true') {
    try {
      const reg = await navigator.serviceWorker.getRegistration('/sw.js');
      if (reg) {
        const sub = await reg.pushManager.getSubscription();
        if (sub) await sub.unsubscribe();
      }
      await fetch('/api/push/subscribe', { method: 'DELETE' });
      btn.textContent = '🔔';
      btn.style.color = '';
      btn.title = '啟用通知';
      btn.dataset.subscribed = 'false';
      showToast('🔕 推播通知已關閉');
    } catch(e) { showToast('❌ 取消失敗：' + e.message); }
    return;
  }

  if (!('serviceWorker' in navigator)) {
    showToast('❌ 此裝置不支援 ServiceWorker（請使用 Chrome 或已加入主畫面的 Safari）');
    return;
  }
  if (!('PushManager' in window)) {
    showToast('❌ 此裝置不支援 Web Push（iOS 請先加入主畫面）');
    return;
  }
  const perm = Notification.permission;
  if (perm === 'denied') {
    showToast('❌ 通知已被封鎖，請在瀏覽器設定 → 此網站 → 通知 → 允許');
    btn.style.color = '#ccc';
    btn.title = '通知已封鎖';
    return;
  }
  try {
    btn.textContent = '⏳';
    // Register SW
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    // Request permission explicitly first (for iOS)
    if (Notification.permission === 'default') {
      const result = await Notification.requestPermission();
      if (result !== 'granted') {
        btn.textContent = '🔔';
        showToast('❌ 通知權限被拒絕');
        return;
      }
    }
    // Subscribe
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    // Send subscription to server
    const subJson = sub.toJSON();
    console.log('[Push] Subscription:', JSON.stringify(subJson).substring(0,100));
    const resp = await fetch('/api/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(subJson)
    });
    const data = await resp.json();
    if (data.ok) {
      btn.textContent = '🔔';
      btn.style.color = '#4caf50';
      btn.title = '通知已啟用 ✅（點擊關閉）';
      btn.dataset.subscribed = 'true';
      showToast('✅ 推播通知已啟用！');
      // Send immediate test push to confirm
      setTimeout(async () => {
        try {
          const r = await fetch('/api/push/test', { method: 'POST' });
          const d = await r.json();
          if (!d.ok) console.warn('[Push] Test failed:', d);
        } catch(e) {}
      }, 1500);
    } else {
      throw new Error(data.error || 'subscribe failed');
    }
  } catch (err) {
    btn.textContent = '🔔';
    console.error('[Push] Subscribe error:', err);
    showToast('❌ 通知啟用失敗：' + err.message);
  }
}

async function checkPushStatus() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  const btn = document.getElementById('push-btn');
  if (!btn) return;
  if (Notification.permission === 'denied') {
    btn.textContent = '🔕';
    btn.style.color = '#ccc';
    btn.title = '通知已封鎖';
    btn.dataset.subscribed = 'false';
    return;
  }
  try {
    const reg = await navigator.serviceWorker.getRegistration('/sw.js');
    if (reg) {
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        btn.textContent = '🔔';
        btn.style.color = '#4caf50';
        btn.title = '通知已啟用 ✅（點擊關閉）';
        btn.dataset.subscribed = 'true';
        return;
      }
    }
  } catch(e) { /* ignore */ }
  btn.dataset.subscribed = 'false';
}
